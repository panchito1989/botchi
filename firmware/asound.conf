# /etc/asound.conf — manda toda la entrada/salida a la tarjeta I2S
# (INMP441 + MAX98357A via dtoverlay=googlevoicehat-soundcard).
# Si `aplay -l` muestra otro número de tarjeta, cambia el 0.

pcm.!default {
    type asym
    playback.pcm "plughw:0,0"
    capture.pcm  "plughw:0,0"
}

ctl.!default {
    type hw
    card 0
}
